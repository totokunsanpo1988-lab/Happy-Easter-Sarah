<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Easter Sarah 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
    color: white;
    text-align: center;
}

.container {
    position: relative;
    z-index: 2;
    padding: 25px;
}

.letter {
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

.typing {
    white-space: pre-wrap;
    font-size: 18px;
    line-height: 1.7;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff69b4;
    font-weight: bold;
    cursor: pointer;
    margin: 10px;
}

/* Floating emojis */
.item {
    position: absolute;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* Egg */
#egg {
    font-size: 70px;
    cursor: pointer;
    margin: 20px;
    display: inline-block;
    transition: transform 0.3s;
}

#egg:hover {
    transform: scale(1.2);
}

/* Hidden message */
.hidden {
    display: none;
    margin-top: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.3);
    border-radius: 15px;
}
</style>

</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_2f5b6d8c60.mp3?filename=soft-piano-ambient-115199.mp3">
</audio>

<div class="container">

<h1>🌸 Happy Easter Sarah 🌸</h1>

<button onclick="start()">💝 Start Experience</button>

<div id="egg">🥚</div>

<div class="letter">
<p id="text" class="typing"></p>

<div id="hiddenMsg" class="hidden">
🌷 Surprise, my cupcake 🩷  
You mean a lot to me, and I’m grateful for you.  
Happy Easter again 💖
</div>

</div>

</div>

<script>

/* 💌 YOUR FULL MESSAGE (UNCHANGED) */
const message = `🌸 Happy Easter 🌸 🥚

Dear Sarah, my cupcake 🩷

Happy Easter. I just want to say how happy I am that I met you and how much I enjoy talking with you. Since we started talking, you’ve been such a kind, thoughtful, and amazing person, and I truly appreciate you more than words can express.

You bring a really good energy into my life, and I look forward to every moment we share. You are such a strong woman — the way you handle situations, the way you care for your students, and the way you take care of the boys truly shows your heart and your strength.

I admire the effort you put into everything you do. Since we started talking, I’ve seen how genuine, patient, and thoughtful you are, and it honestly means a lot to me.

I don’t want this to just stay as talking and chatting… I’d really love for this to grow into something more meaningful with you.

I’m wishing the boys a Happy Easter as well. Happy Easter to Quinton and Wyatt 🩷 🥚  
I hope they have a beautiful Easter and that you all are blessed by the Lord with happiness, peace, and joy.

From me,  
Totokun 💙`;

/* START EXPERIENCE */
function start() {
    playMusic();
    typeText();
    effects();
}

/* 🎵 MUSIC */
function playMusic() {
    let music = document.getElementById("music");
    music.volume = 0;
    music.play().catch(()=>{});

    let fade = setInterval(() => {
        if (music.volume < 0.4) {
            music.volume += 0.02;
        } else {
            clearInterval(fade);
        }
    }, 200);
}

/* ⌨️ TYPING EFFECT */
function typeText() {
    let i = 0;
    function typing() {
        if (i < message.length) {
            document.getElementById("text").innerHTML += message.charAt(i);
            i++;
            setTimeout(typing, 20);
        }
    }
    typing();
}

/* 🌸 FLOATING EFFECTS */
function effects() {
    const emojis = ["🌸","💖","💋","🥚","💕","🌼"];

    setInterval(() => {
        let item = document.createElement("div");
        item.className = "item";
        item.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
        item.style.left = Math.random()*100 + "%";
        item.style.fontSize = (16 + Math.random()*20) + "px";
        item.style.animationDuration = (5 + Math.random()*5) + "s";
        document.body.appendChild(item);

        setTimeout(() => item.remove(), 10000);
    }, 200);
}

/* 🥚 CRACKING EGG */
let cracked = false;

document.getElementById("egg").onclick = function() {
    if (cracked) return;

    this.innerHTML = "🥚💥";

    setTimeout(() => {
        this.innerHTML = "🐣✨";
    }, 700);

    setTimeout(() => {
        document.getElementById("hiddenMsg").style.display = "block";
    }, 1200);

    cracked = true;
};

</script>

</body>
</html>
