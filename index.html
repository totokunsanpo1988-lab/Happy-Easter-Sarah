<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sarah 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
    color: white;
    text-align: center;
}

/* Container */
.container {
    position: relative;
    z-index: 2;
    padding: 30px;
}

/* Letter */
.letter {
    max-width: 800px;
    margin: auto;
    padding: 25px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

/* Typing */
.typing {
    white-space: pre-wrap;
    font-size: 18px;
    line-height: 1.7;
}

/* Buttons */
button {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff69b4;
    font-weight: bold;
    cursor: pointer;
    margin: 10px;
}

/* Floating emojis */
.item {
    position: absolute;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>

</head>

<body>

<!-- 🎵 Music -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_2f5b6d8c60.mp3?filename=soft-piano-ambient-115199.mp3">
</audio>

<div class="container">

<h1>🌸 Happy Easter Sarah 🌸</h1>

<button onclick="start()">💝 Start Experience</button>
<button onclick="playVoice()">🎤 Play Voice</button>

<div class="letter">
<p id="text" class="typing"></p>
</div>

</div>

<script>

/* MESSAGE */
const message = `My cupcake 🩷,

You are strong, graceful, and deeply admired.

The way you care for Quinton and Wyatt shows your beautiful heart.

You carry so much with love, and that is something truly special.

Since we started talking, you’ve brought warmth into my life.

Happy Easter to you, Sarah 🩷  
Happy Easter to Quinton and Wyatt 🐣  

May God bless you with peace, joy, and happiness.

From me,  
TotoKun 💙`;

/* START EVERYTHING */
function start() {
    startMusicWithFade();
    typeText();
    effects();
}

/* 🎵 MUSIC WITH FADE-IN */
function startMusicWithFade() {
    let music = document.getElementById("music");
    music.volume = 0;

    music.play().catch(() => {
        console.log("User interaction required for audio");
    });

    let fade = setInterval(() => {
        if (music.volume < 0.4) {
            music.volume += 0.02;
        } else {
            clearInterval(fade);
        }
    }, 200);
}

/* ⌨️ TYPING */
function typeText() {
    let i = 0;
    function typing() {
        if (i < message.length) {
            document.getElementById("text").innerHTML += message.charAt(i);
            i++;
            setTimeout(typing, 20);
        }
    }
    typing();
}

/* 🎤 VOICE (works when button is pressed) */
function playVoice() {
    let speech = new SpeechSynthesisUtterance(message);
    speech.rate = 1;
    speech.pitch = 1;
    speech.volume = 1;

    speechSynthesis.speak(speech);
}

/* 🌸 EFFECTS */
function effects() {
    const emojis = ["🌸","💖","💋","🥚","💕","🌼"];

    setInterval(() => {
        let item = document.createElement("div");
        item.className = "item";
        item.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        item.style.left = Math.random() * 100 + "%";
        item.style.fontSize = (16 + Math.random()*20) + "px";
        item.style.animationDuration = (5 + Math.random()*5) + "s";
        document.body.appendChild(item);

        setTimeout(() => item.remove(), 10000);
    }, 200);
}

</script>

</body>
</html>
