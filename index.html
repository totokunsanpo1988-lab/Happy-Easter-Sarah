<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sarah 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow: hidden;
}

/* Background video */
#bgVideo {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.35;
    z-index: 0;
}

/* Overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0.4), rgba(0,0,0,0.9));
    z-index: 1;
}

/* Content */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px;
}

/* Letter */
.letter {
    max-width: 800px;
    margin: auto;
    padding: 25px;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    backdrop-filter: blur(12px);
}

/* Typing */
.typing {
    white-space: pre-wrap;
    font-size: 18px;
    line-height: 1.7;
}

/* Button */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff69b4;
    font-weight: bold;
    cursor: pointer;
}

/* Music control */
#musicBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 5;
}

/* Hearts */
.heart {
    position: absolute;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎬 Background -->
<video autoplay muted loop id="bgVideo">
<source src="https://cdn.coverr.co/videos/coverr-sunset-over-the-ocean-6312/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- 🎵 Music -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_2f5b6d8c60.mp3?filename=soft-piano-ambient-115199.mp3">
</audio>

<!-- 🎧 Music button -->
<div id="musicBtn">
<button onclick="playMusic()">🎵 Play Music</button>
</div>

<!-- 💝 Content -->
<div class="container">

<h1>🌸 For Sarah 🌸</h1>

<button onclick="start()">💝 Open Message</button>

<div class="letter">
<p id="text" class="typing"></p>
</div>

</div>

<script>

/* MESSAGE */
const message = `My cupcake 🩷,

You are strong, graceful, and truly admirable.

The way you care for Quinton and Wyatt shows your heart. The way you teach shows your purpose. You are making a difference every day.

Since we started talking, you’ve brought warmth into my life. I value you deeply.

Happy Easter to you, Sarah 🩷  
Happy Easter to Quinton and Wyatt 🐣  

May God bless you with peace and happiness.

From me,  
TotoKun 💙`;

/* START */
function start() {
    playMusic(); // must be triggered by click
    typeText();
    hearts();
}

/* MUSIC FIX */
function playMusic() {
    let music = document.getElementById("music");
    music.volume = 0.4;
    music.play().catch(() => {
        alert("Tap the 'Play Music' button to hear the sound 🎵");
    });
}

/* TYPE */
function typeText() {
    let i = 0;
    function typing() {
        if (i < message.length) {
            document.getElementById("text").innerHTML += message.charAt(i);
            i++;
            setTimeout(typing, 20);
        }
    }
    typing();
}

/* HEARTS */
function hearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "%";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
    }, 300);
}

</script>

</body>
</html>
