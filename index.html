<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Easter</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* Title */
h1 {
    font-size: 40px;
    text-shadow: 0 0 10px #fff, 0 0 20px #ffb6c1;
}

/* Hidden */
.hidden {
    display: none;
}

/* Container */
.container {
    position: relative;
    z-index: 2;
    padding: 30px;
}

/* Letter box */
.letter {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 15px;
    max-width: 700px;
    margin: auto;
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 10s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* Sparkles */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    animation: sparkle 5s linear infinite;
}

@keyframes sparkle {
    0% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1.5); }
    100% { opacity: 0; transform: scale(0); }
}

/* Button */
button {
    padding: 12px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #ee9ca7;
    font-weight: bold;
    cursor: pointer;
    margin: 10px;
}

/* Typing text */
.typing {
    white-space: pre-wrap;
    font-size: 18px;
    line-height: 1.8;
}
</style>

</head>

<body>

<!-- 🎵 Music -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2d2b8c5b5c.mp3?filename=romantic-piano-ambient-110397.mp3">
</audio>

<!-- 🔐 Unlock Screen -->
<div id="unlockScreen">
    <h2>🔐 Easter Surprise</h2>
    <p>Tap to unlock your message</p>
    <button onclick="unlock()">💝 Unlock</button>
</div>

<!-- 🎆 Canvas for confetti -->
<canvas id="confetti"></canvas>

<!-- 🌸 Content -->
<div id="content" class="hidden">

<div class="container">

<h1>🌸 Happy Easter Sarah 🌸</h1>

<div class="letter">
<p id="text" class="typing"></p>
</div>

</div>
</div>

<script>

/* Typing text */
const message = `My cupcake 🩷,

You are incredibly strong, and I deeply admire the way you handle life with grace and patience. Even when things are difficult, you still show strength, kindness, and calmness.

The way you care for Quinton and Wyatt shows how amazing of a mother you are. They are truly blessed to have you.

I also admire how you teach your students. You’re shaping lives, and that takes a heart like yours.

Since we started talking, you’ve brought something meaningful into my life. I truly enjoy every moment with you.

I don’t want this to just stay as talking… I’d love for it to grow into something more meaningful.

Happy Easter to you, my cupcake 🩷  
Happy Easter to Quinton and Wyatt 🐣  

May God bless you all with peace, joy, and happiness.

From me,  
TotoKun 💙`;

/* Typing effect */
function typeText() {
    let i = 0;
    let speed = 25;
    function typing() {
        if (i < message.length) {
            document.getElementById("text").innerHTML += message.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

/* Unlock function */
function unlock() {
    document.getElementById("unlockScreen").style.display = "none";
    document.getElementById("content").classList.remove("hidden");

    // Start music
    document.getElementById("music").play();

    // Start typing
    typeText();

    // Confetti
    startConfetti();

    // Heart burst
    heartBurst();
}

/* Floating hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "%";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 10000);
}, 400);

/* Sparkles */
setInterval(() => {
    let sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.style.left = Math.random() * 100 + "%";
    sparkle.style.top = Math.random() * 100 + "%";
    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 5000);
}, 200);

/* Heart burst */
function heartBurst() {
    for (let i = 0; i < 30; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.style.position = "absolute";
        heart.style.left = "50%";
        heart.style.top = "50%";
        heart.style.fontSize = "20px";
        heart.style.transform = "translate(-50%, -50%)";
        document.body.appendChild(heart);

        let angle = Math.random() * 2 * Math.PI;
        let distance = Math.random() * 200;

        heart.animate([
            { transform: "translate(-50%, -50%)" },
            { transform: `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)` }
        ], {
            duration: 2000,
            easing: "ease-out"
        });

        setTimeout(() => heart.remove(), 2000);
    }
}

/* Simple confetti */
function startConfetti() {
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let pieces = [];

    for (let i = 0; i < 100; i++) {
        pieces.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 6 + 2,
            d: Math.random() * 100
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";

        pieces.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
        });

        update();
    }

    function update() {
        pieces.forEach(p => {
            p.y += 2;
            if (p.y > canvas.height) {
                p.y = 0;
                p.x = Math.random() * canvas.width;
            }
        });
    }

    setInterval(draw, 30);
}

</script>

</body>
</html>
