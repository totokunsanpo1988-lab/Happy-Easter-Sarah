<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Easter Sarah 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
    text-align: center;
    color: #222;
}

/* Container */
.container {
    padding: 30px;
}

/* Message box */
.letter {
    max-width: 800px;
    margin: auto;
    padding: 30px;
    background: #ffffff;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.12);
}

/* Text */
.typing {
    white-space: pre-wrap;
    font-size: 20px;
    line-height: 1.8;
    color: #222;
}

/* Button */
button {
    padding: 12px 22px;
    border: none;
    border-radius: 25px;
    background: #ff6fae;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin: 15px;
}

/* Egg */
#egg {
    font-size: 60px;
    cursor: pointer;
    margin: 20px;
}

/* Hidden message */
.hidden {
    display: none;
    margin-top: 20px;
    padding: 15px;
    background: #ffe6f0;
    border-radius: 10px;
}

/* Floating emojis */
.item {
    position: fixed;
    animation: floatUp linear forwards;
    pointer-events: none;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>

</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3b8c0f6b2b.mp3?filename=soft-piano-112199.mp3">
</audio>

<div class="container">

<h1>🌸 Happy Easter Sarah 🌸</h1>

<button onclick="start()">💝 Start</button>

<div id="egg">🥚</div>

<div class="letter">
<p id="text" class="typing"></p>

<div id="hiddenMsg" class="hidden">
🌷 Surprise my cupcake 🩷  
Happy Easter again 💖  
You’re truly special ✨
</div>

</div>

</div>

<script>

const message = `🌸 Happy Easter 🌸 🥚

Dear Sarah, my cupcake 🩷

Happy Easter. I just want to say how happy I am that I met you and how much I enjoy talking with you. Since we started talking, you’ve been such a kind, thoughtful, and amazing person, and I truly appreciate you more than words can express.

You bring a really good energy into my life, and I look forward to every moment we share. You are such a strong woman — the way you handle situations, the way you care for your students, and the way you take care of the boys truly shows your heart and your strength.

I admire the effort you put into everything you do. Since we started talking, I’ve seen how genuine, patient, and thoughtful you are, and it honestly means a lot to me.

I don’t want this to just stay as talking and chatting… I’d really love for this to grow into something more meaningful with you.

I’m wishing the boys a Happy Easter as well. Happy Easter to Quinton and Wyatt 🩷 🐣  
I hope they have a beautiful Easter and that you all are blessed by the Lord with happiness, peace, and joy.

From me,  
Totokun 🩷`;

let cracked = false;

/* 🚀 START */
function start() {
    playMusic();
    typeText();
    effects();
}

/* 🎵 MUSIC (simple & stable) */
function playMusic() {
    let music = document.getElementById("music");

    let playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise.catch(() => {
            console.log("Tap required to play music");
        });
    }

    music.volume = 0.5;
}

/* ⌨️ TYPING EFFECT */
function typeText() {
    let i = 0;
    let text = document.getElementById("text");

    function typing() {
        if (i < message.length) {
            text.innerHTML += message.charAt(i);
            i++;
            setTimeout(typing, 15);
        }
    }
    typing();
}

/* 🌸 FLOATING EFFECTS */
function effects() {
    const emojis = ["🌸","💖","💋","🥚","💕","🌼","✨"];

    setInterval(() => {
        let item = document.createElement("div");
        item.className = "item";
        item.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
        item.style.left = Math.random()*100 + "%";
        item.style.fontSize = (18 + Math.random()*20) + "px";
        item.style.animationDuration = (5 + Math.random()*5) + "s";

        document.body.appendChild(item);

        setTimeout(() => item.remove(), 10000);
    }, 300);
}

/* 🥚 EGG */
document.getElementById("egg").onclick = function() {
    if (cracked) return;

    this.innerHTML = "🐣✨";
    document.getElementById("hiddenMsg").style.display = "block";

    cracked = true;
};

</script>

</body>
</html>
