<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sarah 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    color: white;
    background: black;
}

/* BACKGROUND VIDEO */
#bgVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    opacity: 0.4;
    object-fit: cover;
    z-index: 0;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0.4), rgba(0,0,0,0.9));
    z-index: 1;
}

/* CONTENT */
.container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px;
}

/* LETTER */
.letter {
    max-width: 800px;
    margin: auto;
    padding: 25px;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    backdrop-filter: blur(12px);
}

/* TEXT */
.typing {
    white-space: pre-wrap;
    font-size: 18px;
    line-height: 1.7;
}

/* BUTTON */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff69b4;
    font-weight: bold;
    cursor: pointer;
}

/* HEARTS */
.heart {
    position: absolute;
    font-size: 18px;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* SPARKLES */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    animation: sparkle 2s infinite;
}

@keyframes sparkle {
    0%,100% {opacity:0}
    50% {opacity:1}
}

/* SCROLL REVEAL */
.hidden {
    display: none;
}
</style>
</head>

<body>

<!-- 🎬 BACKGROUND VIDEO (you can replace this link anytime) -->
<video autoplay muted loop id="bgVideo">
<source src="https://cdn.coverr.co/videos/coverr-sunset-over-the-ocean-6312/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_2f5b6d8c60.mp3?filename=soft-piano-ambient-115199.mp3">
</audio>

<div class="container">

<h1>🌸 For Sarah 🌸</h1>

<button onclick="start()">💝 Begin</button>

<div class="letter hidden" id="letter">
<p id="text" class="typing"></p>
</div>

</div>

<script>

/* MESSAGE */
const message = `My cupcake 🩷,

You are truly remarkable.

The strength you carry, the patience you show, and the way you handle life with grace is something I deeply admire.

The way you love and care for Quinton and Wyatt shows your heart in the most beautiful way. You are not just guiding them—you are shaping their future with love and wisdom.

Your work as a teacher is inspiring. You don’t just teach—you impact lives, and that is something powerful and rare.

Since we started talking, you’ve brought something special into my life. Something calm, warm, and meaningful.

I truly value you.

I don’t want this to remain just conversations… I want this to grow into something real, something strong, something lasting.

Happy Easter to you, Sarah 🩷  
Happy Easter to Quinton and Wyatt 🐣  

May God bless you with peace, joy, and everything your heart desires.

From me,  
TotoKun 💙`;

/* START EXPERIENCE */
function start() {
    document.getElementById("letter").classList.remove("hidden");
    playMusic();
    typeText();
    effects();
}

/* MUSIC */
function playMusic() {
    let music = document.getElementById("music");
    music.volume = 0.4;
    music.play().catch(() => {});
}

/* TYPING */
function typeText() {
    let i = 0;
    function typing() {
        if (i < message.length) {
            document.getElementById("text").innerHTML += message.charAt(i);
            i++;
            setTimeout(typing, 20);
        }
    }
    typing();
}

/* EFFECTS */
function effects() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random()*100 + "%";
        heart.style.animationDuration = (5 + Math.random()*5) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 10000);
    }, 250);

    setInterval(() => {
        let s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random()*100 + "%";
        s.style.top = Math.random()*100 + "%";
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2000);
    }, 100);
}

</script>

</body>
</html>
